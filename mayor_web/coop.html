<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Climate Mayor — Co-op</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body class="game-bg-animated page-fade-in">
<div class="page">
  <div class="header">
    <div>
      <div class="header-title">Climate Mayor Co-op</div>
      <div style="color:var(--muted);font-size:0.85rem" id="coopSubtitle">Loading...</div>
    </div>
    <div class="header-meta">
      <span class="badge badge-blue" id="coopPhase">Loading</span>
      <button class="btn" id="muteBtn" onclick="toggleMute()" title="Mute Sound">🔊</button>
      <button class="btn" onclick="refreshCoop()">Refresh</button>
      <button class="btn" onclick="showSummary()">Summary</button>
      <button onclick="navigateTo('/')" class="btn">Main Menu</button>
    </div>
  </div>

  <div id="coopContent"><div class="card"><p style="color:var(--muted)">Loading co-op session...</p></div></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/effects.js"></script>
<script src="/js/audio.js"></script>
<script src="/js/shortcuts.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const GAME_ID = params.get('id');
const PARTICIPANT_ID = params.get('participant');
let coopState = null;
let ws = null;

// Fade page out smoothly on transition
function navigateTo(url) {
  if (window.AudioManager) AudioManager.playSFX('click');
  document.body.classList.add('page-exit');
  setTimeout(() => {
    window.location.href = url;
  }, 250);
}

async function refreshCoop() {
  coopState = await API.getCoopState(GAME_ID, PARTICIPANT_ID);
  renderCoop();
}

function connectWs() {
  const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${protocol}://${window.location.host}/ws/games/${GAME_ID}/${PARTICIPANT_ID}`);
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type !== 'snapshot') return;
    const mine = (data.participants || []).find(p => p.snapshot && p.snapshot.your_participant_id === PARTICIPANT_ID);
    if (mine) {
      coopState = { game_id: GAME_ID, participant_id: PARTICIPANT_ID, snapshot: mine.snapshot };
      renderCoop();
    }
  };
}

function renderCoop() {
  const s = coopState.snapshot || {};
  document.getElementById('coopSubtitle').textContent = `Participant ${PARTICIPANT_ID} · ${s.participants?.length || 0} players`;
  document.getElementById('coopPhase').textContent = s.phase || 'Unknown';

  const player = s.player_company || {};
  const participants = s.participants || [];
  const readyCheck = s.ready_check?.participants || {};
  const menu = player.abatement_menu || [];

  const cash = player.cash || 0;
  const projected = player.projected_emissions || 0;
  const offsetHoldings = player.offset_holdings || 0;
  const offsetCapPercent = s.offset_usage_cap != null ? s.offset_usage_cap : 0.1;
  const maxUsableOffsets = Math.round(projected * offsetCapPercent * 100) / 100;
  const usableOffsets = Math.min(offsetHoldings, maxUsableOffsets);
  const gap = Math.round((projected - (player.allowances || 0) - usableOffsets) * 100) / 100;

  const oldCash = window.coopLastCash != null ? window.coopLastCash : cash;
  const oldGap = window.coopLastGap != null ? window.coopLastGap : gap;

  window.coopLastCash = cash;
  window.coopLastGap = gap;

  let html = '';
  html += `<div class="grid-2">
    <div class="card">
      <div class="card-title">Your Company</div>
      <div class="stat"><div class="stat-label">Company</div><div class="stat-value">${player.company_name || '-'}</div></div>
      <div class="stat"><div class="stat-label">Cash</div><div class="stat-value accent" id="coop-cash">$${fmt(cash)}</div></div>
      <div class="stat"><div class="stat-label">Offsets Held</div><div class="stat-value">${fmt(offsetHoldings)} t (Usable: ${fmt(usableOffsets)} t)</div></div>
      <div class="stat"><div class="stat-label">Compliance Gap</div><div class="stat-value ${gap > 0 ? 'red' : 'green'}" id="coop-gap">${fmt(gap)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Ready Check</div>
      ${participants.map(p => `<div class="leaderboard-row"><span>${p.player_name}</span><span class="badge ${readyCheck[p.participant_id] ? 'badge-green' : 'badge-orange'}">${readyCheck[p.participant_id] ? 'Ready' : 'Waiting'}</span></div>`).join('')}
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
        <button class="btn btn-primary" onclick="setReady(true)">I'm Ready</button>
        <button class="btn" onclick="setReady(false)">Not Ready</button>
      </div>
    </div>
  </div>`;

  if (menu.length) {
    html += `<div class="card"><div class="card-title">Abatement Menu</div><table><tr><th>Measure</th><th>Reduction</th><th>Cost</th><th></th></tr>`;
    for (const m of menu) {
      html += `<tr>
        <td>${m.label}</td>
        <td>${fmt(m.abatement_amount)}</td>
        <td>$${fmt(m.cost)}</td>
        <td>${m.active || m.pending ? '<span class="badge badge-green">Selected</span>' : `<button class="btn" onclick="activateMeasure('${m.measure_id}')">Activate</button>`}</td>
      </tr>`;
    }
    html += `</table></div>`;
  }

  if (s.phase === 'decision_window' || s.phase === 'year_start') {
    html += `<div class="card"><div class="card-title">Offsets & Market</div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px">
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">
          <span style="color:var(--muted)">Offset Price: <strong style="color:var(--text)">$${fmt(s.offset_price || 25)}/t</strong></span>
          <span style="color:var(--muted)">Offset Cap: <strong style="color:var(--text)">${((s.offset_usage_cap || 0.1)*100).toFixed(0)}% of Emissions</strong></span>
        </div>
        <div style="font-size:0.9rem;background:rgba(255,255,255,0.03);padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.05)">
          <span>Usable Offsets: <strong style="color:${usableOffsets >= maxUsableOffsets && offsetHoldings > 0 ? 'var(--orange)' : 'var(--text)'}">${fmt(usableOffsets)} / ${fmt(maxUsableOffsets)} t</strong></span>
        </div>
      </div>
      
      <div class="glass-panel" style="padding:12px;border-radius:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:180px">
          <label style="font-size:0.8rem;color:var(--muted);display:block;margin-bottom:4px">Quantity to Buy (t):</label>
          <input type="number" id="coopOffsetQtyInput" min="1" max="1000" value="10" class="input-base" style="width:100%">
        </div>
        <button class="btn btn-primary" onclick="buyCoopOffsets(event)" style="margin-top:20px;height:40px">Buy Offsets</button>
      </div>
    </div>`;
  }

  html += `<div class="card">
    <div class="card-title">Session</div>
    <div style="color:var(--muted);font-family:var(--mono)">Game ID: ${GAME_ID}</div>
    <div style="color:var(--muted);font-family:var(--mono)">Participant ID: ${PARTICIPANT_ID}</div>
  </div>`;

  document.getElementById('coopContent').innerHTML = html;

  // Animate numeric statistics smoothly
  if (window.Effects) {
    Effects.animateCounter(document.getElementById('coop-cash'), oldCash, cash, 850, true);
    Effects.animateCounter(document.getElementById('coop-gap'), oldGap, gap, 850, false);
  }
}

function activateMeasure(measureId) {
  if (window.AudioManager) AudioManager.playSFX('activate');
  API.coopDecision(GAME_ID, PARTICIPANT_ID, {
    action: 'activate_abatement',
    payload: { measure_id: measureId },
  }).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function buyCoopOffsets(event) {
  const input = document.getElementById('coopOffsetQtyInput');
  const quantity = parseFloat(input.value);
  if (isNaN(quantity) || quantity <= 0) {
    alert('Please enter a valid quantity');
    return;
  }
  if (window.AudioManager) AudioManager.playSFX('activate');
  API.coopDecision(GAME_ID, PARTICIPANT_ID, {
    action: 'buy_offsets',
    payload: { quantity },
  }).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function setReady(ready) {
  if (window.AudioManager) AudioManager.playSFX('click');
  API.coopReady(GAME_ID, { participant_id: PARTICIPANT_ID, ready }).then(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'refresh' }));
    refreshCoop();
  }).catch(e => alert('Error: ' + e.message));
}

function showSummary() {
  if (window.AudioManager) AudioManager.playSFX('success');
  API.getCoopSummary(GAME_ID).then(data => {
    const mvp = data.mvp ? `${data.mvp.player_name} (${data.mvp.company_name})` : 'None';
    alert(`Co-op Summary\nParticipants: ${data.participants.length}\nMVP: ${mvp}`);
  }).catch(e => alert('Error: ' + e.message));
}

function fmt(n) {
  if (n == null) return '0';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Number(n).toFixed(1);
}

// Persisted audio mute toggle
function toggleMute() {
  if (window.AudioManager) {
    const isMuted = AudioManager.toggleMute();
    const btn = document.getElementById('muteBtn');
    if (btn) btn.textContent = isMuted ? '🔇' : '🔊';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if (window.AudioManager) {
    AudioManager.init();
    const isMuted = AudioManager.getMuteState();
    const btn = document.getElementById('muteBtn');
    if (btn) btn.textContent = isMuted ? '🔇' : '🔊';
    
    document.body.addEventListener('click', () => {
      AudioManager.ensureCtx();
      AudioManager.startAmbient();
    }, { once: true });
  }
});

refreshCoop().then(connectWs).catch(e => {
  document.getElementById('coopContent').innerHTML = `<div class="card"><p style="color:var(--red)">Error: ${e.message}</p></div>`;
});
</script>
</body>
</html>
