<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Climate Mayor — Summary</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/animations.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="game-bg-animated page-fade-in">
<div class="page" id="app">
  <div class="header">
    <div>
      <div class="header-title">&#127942; Game Summary</div>
      <div style="color:var(--muted);font-size:0.85rem" id="subtitle">Loading...</div>
    </div>
    <div class="header-meta">
      <span class="badge badge-green" id="scoreBadge">-</span>
      <button class="btn" onclick="shareSummary()">Share</button>
      <a href="/" class="btn">New Game</a>
    </div>
  </div>

  <div class="grid-2" id="statCards">
    <div class="card"><div class="stat-label">Total Years</div><div class="stat-value accent" id="totalYears">-</div></div>
    <div class="card"><div class="stat-label">Final Cash</div><div class="stat-value" id="finalCash">-</div></div>
    <div class="card"><div class="stat-label">Total Penalties</div><div class="stat-value red" id="totalPenalties">-</div></div>
    <div class="card"><div class="stat-label">Allowances Banked</div><div class="stat-value green" id="bankedAllowances">-</div></div>
  </div>

  <!-- Glorious Performance and Progression Summary Card -->
  <div class="card" id="xpSummaryCard" style="border-color:#b026ff;box-shadow:0 0 25px rgba(176,38,255,0.18);margin-bottom:16px">
    <div class="card-title" style="color:#b026ff">Mayor Performance Profile</div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap">
      <div>
        <div style="font-size:2.4rem;font-weight:900;color:#fff" id="perfGrade">-</div>
        <div style="color:var(--accent);font-family:var(--mono);font-size:0.95rem" id="perfLabel">-</div>
        <div style="color:var(--muted);font-size:0.85rem;margin-top:8px" id="pbMessage"></div>
      </div>
      <div style="flex:1;min-width:260px">
        <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:0.8rem;margin-bottom:6px">
          <span>Global Lifetime Progress</span>
          <span id="summaryXpText">0 XP</span>
        </div>
        <div class="progress-bar" style="background:rgba(255,255,255,0.06);margin-bottom:8px">
          <div class="progress-fill" id="summaryXpBar" style="width:0%;background:linear-gradient(90deg,#00f5ff,#b026ff)"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:0.8rem;align-items:center">
          <span class="level-badge" id="summaryLevelBadge">Lvl 1</span>
          <span id="activeGameXpGained" style="color:var(--green);font-weight:700">+0 XP Gained This Game</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Achievements</div>
    <div id="achievementsList"><p style="color:var(--muted)">Loading achievements...</p></div>
  </div>

  <div class="card">
    <div class="card-title">Emissions Trajectory</div>
    <div class="chart-frame" style="height:300px;position:relative">
      <canvas id="emissionsChart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Final Standings</div>
    <div id="standingsTable"><p style="color:var(--muted)">Loading...</p></div>
  </div>

  <div class="card">
    <div class="card-title">Share Result</div>
    <textarea id="shareText" class="input" style="min-height:100px;font-family:var(--mono);font-size:0.8rem" readonly></textarea>
    <div class="flex gap-8 mt-8">
      <button class="btn btn-primary" onclick="copyShare()">Copy to Clipboard</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/effects.js"></script>
<script src="/js/audio.js"></script>
<script src="/js/progression.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const GAME_ID = params.get('id');

// Fade page out smoothly on transition
function navigateTo(url) {
  if (window.AudioManager) AudioManager.playSFX('click');
  document.body.classList.add('page-exit');
  setTimeout(() => {
    window.location.href = url;
  }, 250);
}

async function load() {
  try {
    const summary = await API.getSummary(GAME_ID);
    const s = summary.snapshot || {};
    const player = s.player_company || s.companies?.[0] || {};

    document.getElementById('subtitle').textContent = `${summary.player_name} · ${summary.difficulty} · ${summary.completed_years}/${summary.total_years} years`;
    document.getElementById('totalYears').textContent = `${summary.completed_years}/${summary.total_years}`;
    document.getElementById('finalCash').textContent = `$${fmt(player.cash || 0)}`;
    document.getElementById('totalPenalties').textContent = `$${fmt(player.cumulative_penalties || player.penalty_due || 0)}`;
    document.getElementById('bankedAllowances').textContent = fmt(player.banked_allowances || 0);

    const totalPen = player.cumulative_penalties || player.penalty_due || 0;

    // Use evaluatePerformance from Progression module
    const perf = Progression.evaluatePerformance(summary);
    document.getElementById('scoreBadge').className = `badge ${perf.gradeClass}`;
    document.getElementById('scoreBadge').textContent = `Grade: ${perf.grade}`;

    document.getElementById('perfGrade').textContent = `GRADE: ${perf.grade}`;
    document.getElementById('perfLabel').textContent = `${perf.gradeLabel} (Performance Score: ${perf.score} / 100)`;

    // Check and save Personal Best
    const isNewPB = Progression.checkAndSavePersonalBest(summary.difficulty, perf.score);
    const pbMessage = document.getElementById('pbMessage');
    const previousPB = localStorage.getItem(`climate_mayor_pb_${summary.difficulty}`) || perf.score;
    if (isNewPB) {
      pbMessage.innerHTML = `🏆 <strong>New Personal Best!</strong> You set a new high score on ${summary.difficulty} mode!`;
      pbMessage.style.color = 'var(--green)';
      if (window.Effects) Effects.screenFlash('rgba(57, 255, 20, 0.15)', 400);
    } else {
      pbMessage.innerHTML = `Personal Best score for ${summary.difficulty} difficulty: <strong>${previousPB} / 100</strong>`;
    }

    // Sync level and XP progression
    const progInfo = Progression.syncProgress(GAME_ID, summary);
    document.getElementById('summaryLevelBadge').textContent = `Lvl ${progInfo.lifetimeLevelInfo.level}`;
    document.getElementById('summaryXpBar').style.width = `${progInfo.lifetimeLevelInfo.percent}%`;
    document.getElementById('summaryXpText').textContent = `${progInfo.lifetimeLevelInfo.xpInLevel} / ${progInfo.lifetimeLevelInfo.levelRange} XP`;
    document.getElementById('activeGameXpGained').textContent = `+${progInfo.activeXp} XP Gained This Game`;

    const companies = s.leaderboard || s.companies || [];
    if (companies.length > 0) {
      let html = '<table><tr><th>#</th><th>Company</th><th>Emissions</th><th>Allowances</th><th>Cash</th><th>Penalties</th></tr>';
      companies.slice().sort((a,b) => (a.cumulative_penalties||0) - (b.cumulative_penalties||0)).forEach((c,i) => {
        const isPlayer = c.company_id === player.company_id;
        html += `<tr style="${isPlayer ? 'background:rgba(0,245,255,0.05)' : ''}">
          <td>${i+1}</td>
          <td>${c.company_name || c.name} ${isPlayer ? '(You)' : ''}</td>
          <td style="font-family:var(--mono)">${fmt(c.projected_emissions || c.emissions || 0)}</td>
          <td style="font-family:var(--mono)">${fmt(c.allowances || 0)}</td>
          <td style="font-family:var(--mono)">$${fmt(c.cash || 0)}</td>
          <td style="font-family:var(--mono);color:${(c.cumulative_penalties||0) > 0 ? 'var(--red)' : 'var(--green)'}">$${fmt(c.cumulative_penalties || 0)}</td>
        </tr>`;
      });
      html += '</table>';
      document.getElementById('standingsTable').innerHTML = html;
    }

    const share = `Climate Mayor Result
Player: ${summary.player_name}
Difficulty: ${summary.difficulty}
Years: ${summary.completed_years}/${summary.total_years}
Performance Grade: ${perf.grade} (${perf.gradeLabel})
Performance Score: ${perf.score}/100
Final Cash: $${fmt(player.cash || 0)}
Total Penalties: $${fmt(totalPen)}
Global Progress: Level ${progInfo.lifetimeLevelInfo.level}
Achievements Unlocked: ${(summary.achievements || []).map(a => a.title).join(', ') || 'None'}`;
    document.getElementById('shareText').value = share;

    const achievements = summary.achievements || [];
    document.getElementById('achievementsList').innerHTML = achievements.length
      ? achievements.map(a => `
          <div class="leaderboard-row">
            <div>
              <strong>${a.title}</strong>
              <div style="color:var(--muted);font-size:0.85rem">${a.description}</div>
            </div>
            <span class="badge badge-green">Unlocked</span>
          </div>
        `).join('')
      : '<p style="color:var(--muted)">No achievements unlocked this run.</p>';

    drawChart(s);
  } catch (e) {
    document.getElementById('subtitle').textContent = 'Error: ' + e.message;
  }
}

function drawChart(snapshot) {
  const canvas = document.getElementById('emissionsChart');
  const ctx = canvas.getContext('2d');
  const companies = snapshot.leaderboard || snapshot.companies || [];
  const labels = companies.map(c => c.company_name || c.name || 'Company');
  const emissions = companies.map(c => c.projected_emissions || c.emissions || 0);
  const allowances = companies.map(c => c.allowances || 0);
  const penalties = companies.map(c => c.cumulative_penalties || 0);

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Emissions', data: emissions, backgroundColor: 'rgba(255,68,68,0.6)', borderColor: '#ff4444', borderWidth: 1 },
        { label: 'Allowances', data: allowances, backgroundColor: 'rgba(0,245,255,0.6)', borderColor: '#00f5ff', borderWidth: 1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false, resizeDelay: 150, normalized: true,
      plugins: { legend: { labels: { color: '#e9f6ff' } } },
      scales: {
        x: { ticks: { color: '#8ea3ad' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: { beginAtZero: true, ticks: { color: '#8ea3ad', callback: v => v >= 1000 ? (v/1000).toFixed(0)+'K' : v }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

function copyShare() {
  const t = document.getElementById('shareText');
  t.select(); navigator.clipboard.writeText(t.value);
  alert('Copied!');
}

function shareSummary() { copyShare(); }

function fmt(n) {
  if (n == null) return '0';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+'K';
  return n.toFixed(1);
}

load();
document.addEventListener('DOMContentLoaded', () => {
  if (window.AudioManager) {
    AudioManager.init();
    
    // Play celebratory sound on opening summary
    document.body.addEventListener('click', () => {
      AudioManager.ensureCtx();
    }, { once: true });
  }
});
</script>
</body>
</html>
