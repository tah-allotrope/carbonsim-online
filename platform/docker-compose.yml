version: "3.8"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${OTREE_PORT:-8000}:8000"
    environment:
      - OTREE_ADMIN_PASSWORD=${OTREE_ADMIN_PASSWORD:-carbonsim}
      - OTREE_PRODUCTION=1
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      - DATABASE_URL=${DATABASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./carbonsim_phase12:/app/carbonsim_phase12
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["otree", "prodserver2of2"]
    environment:
      - OTREE_ADMIN_PASSWORD=${OTREE_ADMIN_PASSWORD:-carbonsim}
      - OTREE_PRODUCTION=1
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      - DATABASE_URL=${DATABASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./carbonsim_phase12:/app/carbonsim_phase12
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-carbonsim}
      - POSTGRES_USER=${POSTGRES_USER:-carbonsim}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-carbonsim_local}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-carbonsim}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata: