<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Climate Mayor — Competitive</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/animations.css">
<style>
.city-container { width:100%;height:260px;border-radius:var(--radius);overflow:hidden;margin-bottom:16px;border:1px solid var(--bevel-dark);position:relative;background:var(--bg-soft);box-shadow:inset 1px 1px 0 var(--bevel-light),inset -1px -1px 0 var(--bevel-dark),0 4px 0 var(--bevel-shadow) }
.city-container canvas { display:block;width:100%;height:100% }
.city-overlay { position:absolute;bottom:6px;left:10px;right:10px;display:flex;justify-content:space-between;align-items:flex-end;pointer-events:none;font-family:var(--mono);font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em }
</style>
</head>
<body class="game-bg-animated page-fade-in">
<div class="page">
  <div class="header">
    <div>
      <div class="header-title">&#127758; Climate Mayor — Competitive</div>
      <div style="color:var(--muted);font-size:0.85rem" id="coopSubtitle">Loading...</div>
    </div>
    <div class="header-meta">
      <span class="badge badge-blue" id="coopPhase">Loading</span>
      <span class="badge badge-orange" id="coopYear"></span>
      <button class="btn" id="muteBtn" onclick="toggleMute()" title="Mute Sound">&#128266;</button>
      <button class="btn" onclick="refreshCoop()">Refresh</button>
      <button onclick="navigateTo('/')" class="btn">Menu</button>
    </div>
  </div>
  <div class="city-container" id="cityContainer">
    <canvas id="cityCanvas" aria-hidden="true"></canvas>
    <div class="city-overlay">
      <span id="cityLabel">Multiplayer Arena</span>
      <span id="cityCompliance">--</span>
    </div>
  </div>

  <div id="coopContent"><div class="card"><p style="color:var(--muted)">Loading session...</p></div></div>
</div>

<script src="/js/api.js"></script>
<script src="/js/effects.js"></script>
<script src="/js/audio.js"></script>
  <script src="/js/shortcuts.js"></script>
  <script src="/js/assets.js"></script>
  <script src="/js/isocity.js"></script>
  <script>
const params = new URLSearchParams(window.location.search);
const GAME_ID = params.get('id');
const PARTICIPANT_ID = params.get('participant');
const CityRenderer = window.Isocity;
let coopState = null;
let ws = null;
let wsReconnectTimer = null;

function navigateTo(url) {
  if (window.AudioManager) AudioManager.playSFX('click');
  document.body.classList.add('page-exit');
  setTimeout(() => { window.location.href = url; }, 250);
}

async function refreshCoop() {
  try {
    const data = await API.getCoopState(GAME_ID, PARTICIPANT_ID);
    coopState = { game_id: GAME_ID, participant_id: PARTICIPANT_ID, snapshot: data.snapshot, game_status: data.game_status, room_code: data.room_code };
    renderCoop();
    if (coopState.snapshot && CityRenderer) {
      CityRenderer.update(coopState.snapshot);
      const player = coopState.snapshot.player_company || {};
      const ratio = player.projected_emissions > 0 ? Math.round((player.allowances / player.projected_emissions) * 100) : 100;
      document.getElementById('cityCompliance').textContent = `Compliance: ${ratio}%`;
      document.getElementById('cityLabel').textContent = `Room ${coopState.room_code} — Year ${coopState.snapshot.current_year || '?'}`;
    }
  } catch (e) {
    document.getElementById('coopContent').innerHTML = `<div class="card"><p style="color:var(--red)">Error: ${e.message}</p></div>`;
  }
}

function connectWs() {
  const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${protocol}://${window.location.host}/ws/games/${GAME_ID}/${PARTICIPANT_ID}`);
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.type !== 'snapshot') return;
    const mine = (data.participants || []).find(p => p.snapshot && p.snapshot.your_participant_id === PARTICIPANT_ID);
    if (mine) {
      coopState = { game_id: GAME_ID, participant_id: PARTICIPANT_ID, snapshot: mine.snapshot, game_status: data.game_status, room_code: data.room_code };
      renderCoop();
    }
  };
  ws.onclose = () => {
    clearTimeout(wsReconnectTimer);
    wsReconnectTimer = setTimeout(() => { connectWs(); refreshCoop(); }, 2000);
  };
  ws.onerror = () => {};
}

function renderCoop() {
  const s = coopState.snapshot || {};
  const status = coopState.game_status || s.game_status || 'lobby';
  document.getElementById('coopPhase').textContent = s.phase || (status === 'lobby' ? 'Lobby' : 'Unknown');
  document.getElementById('coopYear').textContent = status === 'lobby' ? '' : `Year ${s.current_year || '?'}/${s.total_years || '?'}`;

  if (status === 'lobby' || status === 'waiting') {
    renderLobby(s);
  } else if (status === 'completed') {
    renderSummary(s);
  } else {
    renderGame(s);
  }
}

function renderLobby(s) {
  const participants = s.participants || [];
  const isHost = s.is_host || false;
  const roomCode = coopState.room_code || s.room_code || '------';
  const maxPlayers = s.max_players || 2;

  document.getElementById('coopSubtitle').textContent = `Room: ${roomCode} · ${participants.length}/${maxPlayers} players`;

  let html = `<div class="card" style="text-align:center;padding:40px 20px">
    <div style="font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px;font-family:var(--mono)">Room Code</div>
    <div style="font-size:3rem;font-family:var(--mono);color:var(--accent);letter-spacing:0.3em;text-shadow:var(--glow);margin-bottom:16px">${roomCode}</div>
    <div style="color:var(--muted);font-size:0.85rem">Share this code with other players to join</div>
  </div>`;

  html += `<div class="grid-2"><div class="card">
    <div class="card-title">Players (${participants.length}/${maxPlayers})</div>`;
  for (const p of participants) {
    const hostBadge = p.is_host ? ' <span class="badge badge-blue" style="font-size:0.65rem">HOST</span>' : '';
    const statusBadge = p.connected
      ? '<span class="badge badge-green" style="font-size:0.65rem">Connected</span>'
      : '<span class="badge badge-orange" style="font-size:0.65rem">Away</span>';
    html += `<div class="leaderboard-row"><span>${p.player_name}${hostBadge}</span><span>${statusBadge}</span></div>`;
  }
  for (let i = participants.length; i < maxPlayers; i++) {
    html += `<div class="leaderboard-row" style="opacity:0.3"><span>Waiting for player...</span><span class="badge badge-orange" style="font-size:0.65rem">Open</span></div>`;
  }
  html += `</div>`;

  html += `<div class="card">
    <div class="card-title">Game Settings</div>
    <div class="stat"><div class="stat-label">Difficulty</div><div class="stat-value">${s.difficulty || 'standard'}</div></div>
    <div class="stat"><div class="stat-label">Mode</div><div class="stat-value">Competitive</div></div>
    <div class="stat"><div class="stat-label">Your Company</div><div class="stat-value">${(s.player_company || {}).company_name || '-'}</div></div>`;
  if (isHost) {
    const canStart = participants.length >= 2;
    html += `<div style="margin-top:16px">
      <button class="btn btn-primary" onclick="startGame()" ${canStart ? '' : 'disabled'} style="width:100%;justify-content:center">
        ${canStart ? 'Start Game' : 'Need ' + (2 - participants.length) + ' more player(s)'}
      </button>
    </div>`;
  } else {
    html += `<div style="margin-top:16px;color:var(--muted);font-size:0.85rem;text-align:center">Waiting for host to start the game...</div>`;
  }
  html += `</div></div>`;

  document.getElementById('coopContent').innerHTML = html;
}

function renderGame(s) {
  const player = s.player_company || {};
  const participants = s.participants || [];
  const leaderboard = s.leaderboard || [];
  const isHost = s.is_host || false;
  const menu = player.abatement_menu || [];
  const roomCode = coopState.room_code || s.room_code || '';

  const cash = player.cash || 0;
  const projected = player.projected_emissions || 0;
  const offsetHoldings = player.offset_holdings || 0;
  const offsetCapPercent = s.offset_usage_cap != null ? s.offset_usage_cap : 0.1;
  const maxUsableOffsets = Math.round(projected * offsetCapPercent * 100) / 100;
  const usableOffsets = Math.min(offsetHoldings, maxUsableOffsets);
  const gap = Math.round((projected - (player.allowances || 0) - usableOffsets) * 100) / 100;

  document.getElementById('coopSubtitle').textContent = `${player.company_name || 'Player'} · Room: ${roomCode}`;

  let html = '';

  if (isHost) {
    html += `<div class="card">
      <div class="card-title">Host Controls</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="advanceYear()">Advance Year</button>
        <button class="btn" onclick="pauseGame()">Pause</button>
        <button class="btn" onclick="resumeGame()">Resume</button>
      </div>
    </div>`;
  }

  html += `<div class="grid-2"><div class="card">
    <div class="card-title">Your Company</div>
    <div class="stat"><div class="stat-label">Company</div><div class="stat-value">${player.company_name || '-'}</div></div>
    <div class="stat"><div class="stat-label">Cash</div><div class="stat-value accent" id="coop-cash">$${fmt(cash)}</div></div>
    <div class="stat"><div class="stat-label">Projected Emissions</div><div class="stat-value">${fmt(projected)} t</div></div>
    <div class="stat"><div class="stat-label">Allowances</div><div class="stat-value">${fmt(player.allowances || 0)} t</div></div>
    <div class="stat"><div class="stat-label">Offsets Held</div><div class="stat-value">${fmt(offsetHoldings)} t (Usable: ${fmt(usableOffsets)} t)</div></div>
    <div class="stat"><div class="stat-label">Banked</div><div class="stat-value">${fmt(player.banked_allowances || 0)} t</div></div>
    <div class="stat"><div class="stat-label">Compliance Gap</div><div class="stat-value ${gap > 0 ? 'red' : 'green'}" id="coop-gap">${fmt(gap)}</div></div>
    <div class="stat"><div class="stat-label">Cumulative Penalties</div><div class="stat-value red">$${fmt(player.cumulative_penalties || 0)}</div></div>
  </div>`;

  html += `<div class="card">
    <div class="card-title">Leaderboard</div>`;
  for (const row of leaderboard) {
    if (row.is_bot) continue;
    const isYou = row.participant_id === PARTICIPANT_ID;
    const rankColors = ['', 'var(--accent)', 'var(--muted)', 'var(--orange)'];
    const rankColor = rankColors[row.rank] || 'var(--muted)';
    html += `<div class="leaderboard-row" style="${isYou ? 'background:rgba(31,147,199,0.10);border-radius:6px;padding:6px 8px' : ''}">
      <span><span style="color:${rankColor};font-family:var(--mono);margin-right:8px">#${row.rank}</span>${row.player_name}${isYou ? ' (you)' : ''}</span>
      <span style="font-family:var(--mono);font-size:0.8rem">
        <span style="color:var(--green)">$${fmt(row.cash)}</span> ·
        <span style="color:${row.cumulative_penalties > 0 ? 'var(--red)' : 'var(--muted)'}">-$${fmt(row.cumulative_penalties)}</span>
      </span>
    </div>`;
  }
  html += `</div></div>`;

  if (menu.length && (s.phase === 'decision_window' || s.phase === 'year_start')) {
    html += `<div class="card"><div class="card-title">Abatement Menu</div><table><tr><th>Measure</th><th>Reduction</th><th>Cost</th><th></th></tr>`;
    for (const m of menu) {
      html += `<tr>
        <td>${m.label}</td>
        <td>${fmt(m.abatement_amount)} t</td>
        <td>$${fmt(m.cost)}</td>
        <td>${m.active || m.pending ? '<span class="badge badge-green">Active</span>' : `<button class="btn" onclick="activateMeasure('${m.measure_id}')">Activate</button>`}</td>
      </tr>`;
    }
    html += `</table></div>`;
  }

  if (s.phase === 'decision_window' || s.phase === 'year_start') {
    html += `<div class="card"><div class="card-title">Offset Market</div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:16px">
        <span style="color:var(--muted)">Price: <strong style="color:var(--text)">$${fmt(s.offset_price || 25)}/t</strong></span>
        <span style="color:var(--muted)">Cap: <strong style="color:var(--text)">${((s.offset_usage_cap || 0.1)*100).toFixed(0)}%</strong></span>
      </div>
      <div class="glass-panel" style="padding:12px;border-radius:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:180px">
          <label style="font-size:0.8rem;color:var(--muted);display:block;margin-bottom:4px">Quantity (t):</label>
          <input type="number" id="coopOffsetQtyInput" min="1" max="1000" value="10" class="input-base" style="width:100%">
        </div>
        <button class="btn btn-primary" onclick="buyOffsets()" style="margin-top:20px;height:40px">Buy Offsets</button>
      </div>
    </div>`;
  }

  const auctions = (s.auctions || []).filter(a => a.year === (s.current_year || 0));
  if (auctions.length > 0) {
    html += `<div class="card"><div class="card-title">Auctions</div>`;
    for (const a of auctions) {
      const statusBadge = a.status === 'open' ? '<span class="badge badge-green">Open</span>' :
                          a.status === 'cleared' ? '<span class="badge badge-blue">Cleared</span>' :
                          '<span class="badge badge-orange">Scheduled</span>';
      html += `<div style="margin-bottom:12px;padding:12px;border:1px solid var(--line);border-radius:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-family:var(--mono)">Auction: ${a.supply}t allowances</span>
          ${statusBadge}
        </div>
        <div style="color:var(--muted);font-size:0.8rem;margin-bottom:8px">Price range: $${a.price_floor || 80} - $${a.price_ceiling || 300}</div>`;
      if (a.status === 'open') {
        html += `<div style="display:flex;gap:8px;align-items:end;flex-wrap:wrap">
          <div style="flex:1;min-width:100px"><label style="font-size:0.7rem;color:var(--muted)">Qty (t)</label><input type="number" id="bidQty_${a.auction_id}" min="1" value="10" class="input-base" style="width:100%"></div>
          <div style="flex:1;min-width:100px"><label style="font-size:0.7rem;color:var(--muted)">Price ($)</label><input type="number" id="bidPrice_${a.auction_id}" min="${a.price_floor || 80}" max="${a.price_ceiling || 300}" value="${Math.round((a.price_floor + a.price_ceiling) / 2)}" class="input-base" style="width:100%"></div>
          <button class="btn btn-primary" onclick="submitBid('${a.auction_id}')" style="height:38px">Bid</button>
        </div>`;
        if (isHost) {
          html += `<div style="margin-top:8px"><button class="btn btn-danger" onclick="closeAuction('${a.auction_id}')" style="font-size:0.8rem">Close Auction</button></div>`;
        }
      } else if (a.status === 'cleared' && a.results) {
        html += `<div style="font-size:0.8rem;color:var(--muted)">Clearing price: $${a.clearing_price || 0}/t</div>`;
      } else if (a.status === 'scheduled' && isHost) {
        html += `<button class="btn btn-primary" onclick="openAuction()" style="font-size:0.8rem;margin-top:8px">Open Auction</button>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `<div class="card">
    <div class="card-title">Session Info</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-family:var(--mono);font-size:0.8rem">
      <span>Room: ${roomCode}</span>
      <span>Phase: ${s.phase || '-'}</span>
      <span>Year: ${s.current_year || '?'}/${s.total_years || '?'}</span>
    </div>
  </div>`;

  document.getElementById('coopContent').innerHTML = html;

  if (window.Effects) {
    const oldCash = window._lastCash != null ? window._lastCash : cash;
    const oldGap = window._lastGap != null ? window._lastGap : gap;
    window._lastCash = cash;
    window._lastGap = gap;
    Effects.animateCounter(document.getElementById('coop-cash'), oldCash, cash, 850, true);
    Effects.animateCounter(document.getElementById('coop-gap'), oldGap, gap, 850, false);
  }
}

function renderSummary(s) {
  const leaderboard = s.leaderboard || [];
  const humanRows = leaderboard.filter(r => !r.is_bot);

  document.getElementById('coopSubtitle').textContent = 'Game Complete — Final Results';
  document.getElementById('coopPhase').textContent = 'Complete';
  document.getElementById('coopYear').textContent = '';

  let html = `<div class="card" style="text-align:center;padding:40px 20px">
    <div style="font-size:1.5rem;color:var(--accent);margin-bottom:8px">Game Over</div>
    <div style="color:var(--muted)">Final rankings after ${s.current_year || '?'} years</div>
  </div>`;

  html += `<div class="card"><div class="card-title">Final Leaderboard</div><table>
    <tr><th>Rank</th><th>Player</th><th>Company</th><th>Cash</th><th>Penalties</th><th>Gap</th></tr>`;
  for (const row of humanRows) {
    const rankStyle = row.rank === 1 ? 'color:var(--accent);font-weight:bold' : row.rank === 2 ? 'color:var(--muted)' : '';
    const medal = row.rank === 1 ? '&#127942; ' : row.rank === 2 ? '&#129352; ' : row.rank === 3 ? '&#129353; ' : '';
    html += `<tr>
      <td style="${rankStyle}">${medal}#${row.rank}</td>
      <td>${row.player_name}</td>
      <td style="color:var(--muted)">${row.company_name}</td>
      <td style="color:var(--green)">$${fmt(row.cash)}</td>
      <td style="color:${row.cumulative_penalties > 0 ? 'var(--red)' : 'var(--muted)'}">$${fmt(row.cumulative_penalties)}</td>
      <td>${fmt(row.compliance_gap)}</td>
    </tr>`;
  }
  html += `</table></div>`;

  html += `<div style="text-align:center;margin-top:16px">
    <button class="btn btn-primary" onclick="navigateTo('/')">Back to Menu</button>
  </div>`;

  document.getElementById('coopContent').innerHTML = html;
}

function startGame() {
  if (window.AudioManager) AudioManager.playSFX('success');
  API.startCoopGame(GAME_ID, PARTICIPANT_ID).then(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'refresh' }));
    refreshCoop();
  }).catch(e => alert('Error: ' + e.message));
}

function advanceYear() {
  if (window.AudioManager) AudioManager.playSFX('click');
  if (CityRenderer) CityRenderer.triggerYearTransition();
  API.hostAdvanceYear(GAME_ID, PARTICIPANT_ID).then(() => {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type: 'refresh' }));
    refreshCoop();
  }).catch(e => alert('Error: ' + e.message));
}

function pauseGame() {
  API.hostPause(GAME_ID, PARTICIPANT_ID).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function resumeGame() {
  API.hostResume(GAME_ID, PARTICIPANT_ID).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function activateMeasure(measureId) {
  if (window.AudioManager) AudioManager.playSFX('activate');
  if (CityRenderer) {
    CityRenderer.triggerAbatementEffect();
    CityRenderer.emote('\u{1F49A}'); // 💚
    const m = ((coopState && coopState.snapshot && coopState.snapshot.player_company &&
      coopState.snapshot.player_company.abatement_menu) || []).find(x => x.measure_id === measureId);
    if (m) CityRenderer.float('-' + m.abatement_amount + ' t', '#4caf50');
  }
  API.coopDecision(GAME_ID, PARTICIPANT_ID, {
    action: 'activate_abatement',
    payload: { measure_id: measureId },
  }).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function buyOffsets() {
  const input = document.getElementById('coopOffsetQtyInput');
  const quantity = parseFloat(input.value);
  if (isNaN(quantity) || quantity <= 0) { alert('Enter a valid quantity'); return; }
  if (window.AudioManager) AudioManager.playSFX('activate');
  if (CityRenderer) {
    CityRenderer.triggerOffsetEffect();
    CityRenderer.emote('\u{1FA99}'); // 🪙
    CityRenderer.float('+' + quantity + ' t', '#1f93c7');
  }
  API.coopDecision(GAME_ID, PARTICIPANT_ID, {
    action: 'buy_offsets',
    payload: { quantity },
  }).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function openAuction() {
  API.openAuction(GAME_ID, PARTICIPANT_ID).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function submitBid(auctionId) {
  const qty = parseFloat(document.getElementById('bidQty_' + auctionId)?.value || 0);
  const price = parseFloat(document.getElementById('bidPrice_' + auctionId)?.value || 0);
  if (!qty || !price) { alert('Enter quantity and price'); return; }
  API.submitBid(GAME_ID, auctionId, PARTICIPANT_ID, { quantity: qty, price: price }).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function closeAuction(auctionId) {
  API.closeAuction(GAME_ID, auctionId, PARTICIPANT_ID).then(refreshCoop).catch(e => alert('Error: ' + e.message));
}

function fmt(n) {
  if (n == null) return '0';
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Number(n).toFixed(1);
}

function toggleMute() {
  if (window.AudioManager) {
    const isMuted = AudioManager.toggleMute();
    const btn = document.getElementById('muteBtn');
    if (btn) btn.textContent = isMuted ? '\u{1F507}' : '\u{1F50A}';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if (window.AudioManager) {
    AudioManager.init();
    const isMuted = AudioManager.getMuteState();
    const btn = document.getElementById('muteBtn');
    if (btn) btn.textContent = isMuted ? '\u{1F507}' : '\u{1F50A}';
    document.body.addEventListener('click', () => {
      AudioManager.ensureCtx();
      AudioManager.startAmbient();
    }, { once: true });
  }
});

refreshCoop().then(() => {
  connectWs();
  if (coopState && coopState.snapshot && CityRenderer) {
    CityRenderer.init('cityCanvas', coopState.snapshot);
  }
});
</script>
</body>
</html>
