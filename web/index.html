<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Climate Mayor — New Game</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/animations.css">
</head>
<body class="game-bg-animated page-fade-in">
<div class="page" id="app">
  <div class="header">
    <div class="header-title">&#127758; Climate Mayor</div>
    <div class="header-meta" style="display:flex;align-items:center;gap:12px">
      <span id="globalLifetimeHUD" style="font-family:var(--mono);color:var(--accent);font-size:0.85rem"></span>
      <span class="badge badge-blue">Single-Player</span>
      <button class="btn" id="muteBtn" onclick="toggleMute()" style="padding:6px 12px;font-size:0.85rem;border-radius:6px" title="Toggle Sound">🔊</button>
    </div>
  </div>

  <div class="grid-2">
    <div>
      <div class="card">
        <div class="card-title">New Game</div>
        <div style="margin-bottom:14px">
          <label>Your Name</label>
          <input class="input" id="playerName" value="Player" placeholder="Enter your name">
        </div>
        <div style="margin-bottom:14px">
          <label>Province</label>
          <input class="input" id="provinceName" value="Binh Thuan" placeholder="Province name">
        </div>
        <div style="margin-bottom:14px">
          <label>Difficulty</label>
          <select id="difficulty">
            <option value="easy">Easy — 20 years, generous allocation, gentle cap decline</option>
            <option value="standard" selected>Standard — 15 years, moderate challenge</option>
            <option value="hard">Hard — 10 years, steep cap decline, high penalties</option>
          </select>
        </div>
        <div style="margin-bottom:18px">
          <label style="display:flex;align-items:center;gap:10px;text-transform:none;letter-spacing:normal;font-size:0.9rem;color:var(--text)">
            <input type="checkbox" id="tutorialMode" style="width:auto">
            Start with the guided 3-year tutorial
          </label>
          <div style="margin-top:6px;color:var(--muted);font-size:0.85rem">
            Recommended for first-time players. The tutorial uses fixed event cards and lighter guidance.
          </div>
        </div>
        <button class="btn btn-primary" onclick="startGame()" style="width:100%;justify-content:center">
          Start Game
        </button>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="card-title">Saved Games</div>
        <div id="gameList"><p style="color:var(--muted)">Loading...</p></div>
      </div>
      <div class="card">
        <div class="card-title">Competitive Multiplayer</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;gap:8px;align-items:end">
            <div style="flex:1"><label>Players</label><select id="coopPlayerCount"><option value="2">2 Players</option><option value="3">3 Players</option><option value="4">4 Players</option><option value="6">6 Players</option><option value="8">8 Players</option></select></div>
            <button class="btn btn-primary" onclick="createCoop()" style="height:42px;white-space:nowrap">Create Game</button>
          </div>
          <div style="border-top:1px solid var(--line);padding-top:10px">
            <label>Room Code</label>
            <div style="display:flex;gap:8px">
              <input class="input" id="coopRoomCode" placeholder="e.g. ABC123" style="text-transform:uppercase;font-family:var(--mono);letter-spacing:0.15em">
              <button class="btn" onclick="joinByCode()" style="white-space:nowrap">Join</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/audio.js"></script>
<script src="/js/progression.js"></script>
<script>
// Fade page out smoothly on transition
function navigateTo(url) {
  if (window.AudioManager) AudioManager.playSFX('click');
  document.body.classList.add('page-exit');
  setTimeout(() => {
    window.location.href = url;
  }, 250);
}

async function startGame() {
  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Creating...';
  try {
    const data = await API.createGame({
      player_name: document.getElementById('playerName').value || 'Player',
      province_name: document.getElementById('provinceName').value || 'default',
      difficulty: document.getElementById('difficulty').value,
      tutorial_mode: document.getElementById('tutorialMode').checked,
    });
    navigateTo(`/game.html?id=${data.game_id}`);
  } catch (e) {
    alert('Error: ' + e.message);
    btn.disabled = false; btn.textContent = 'Start Game';
  }
}

async function createCoop() {
  try {
    const data = await API.createCoop({
      host_name: document.getElementById('playerName').value || 'Host',
      province_name: document.getElementById('provinceName').value || 'default',
      difficulty: document.getElementById('difficulty').value,
      player_count: parseInt(document.getElementById('coopPlayerCount').value) || 2,
    });
    navigateTo(`/coop.html?id=${data.game_id}&participant=${data.participant_id}`);
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function joinByCode() {
  const code = document.getElementById('coopRoomCode').value.trim().toUpperCase();
  if (!code) { alert('Enter a room code'); return; }
  try {
    const data = await API.joinByRoomCode({
      room_code: code,
      player_name: document.getElementById('playerName').value || 'Guest',
    });
    navigateTo(`/coop.html?id=${data.game_id}&participant=${data.participant_id}`);
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function loadGames() {
  const el = document.getElementById('gameList');
  try {
    const games = await API.listGames();
    const active = games.filter(g => g.status === 'active');
    if (active.length === 0) {
      el.innerHTML = '<p style="color:var(--muted)">No saved games found. Start a new one!</p>';
      return;
    }
    el.innerHTML = active.map(g => `
      <div class="leaderboard-row" style="cursor:pointer" onclick="navigateTo('/game.html?id=${g.game_id}')">
        <div>
          <strong>${g.player_name}</strong>
          <div style="color:var(--muted);font-size:0.8rem;font-family:var(--mono)">
            ${g.difficulty} · Year ${g.current_year}/${g.total_years}
          </div>
        </div>
        <span class="badge badge-green">Resume</span>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = `<p style="color:var(--red)">Error loading games: ${e.message}</p>`;
  }
}

// Sync lifetime HUD display
function updateLifetimeHUD() {
  if (window.Progression) {
    Progression.initLifetime();
    const lifetimeXp = parseInt(localStorage.getItem('climate_mayor_lifetime_xp')) || 0;
    const lvlInfo = Progression.getLevelInfo(lifetimeXp);
    document.getElementById('globalLifetimeHUD').innerHTML = `<span class="level-badge">Lvl ${lvlInfo.level}</span> <span class="xp-text">${lvlInfo.currentXp} XP</span>`;
  }
}

// Mute toggle helper
function toggleMute() {
  if (window.AudioManager) {
    const isMuted = AudioManager.toggleMute();
    document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  if (window.AudioManager) {
    AudioManager.init();
    const isMuted = AudioManager.getMuteState();
    document.getElementById('muteBtn').textContent = isMuted ? '🔇' : '🔊';
    
    // Play ambient loops on first user click anywhere
    document.body.addEventListener('click', () => {
      AudioManager.ensureCtx();
    }, { once: true });
  }
  updateLifetimeHUD();
  loadGames();
});
</script>
</body>
</html>
